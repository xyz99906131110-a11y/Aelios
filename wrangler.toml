name = "companion-memory-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-01"
keep_vars = true

[triggers]
# Cloudflare cron uses UTC. 20:10 UTC is 04:10 in Singapore/China time.
crons = ["10 20 * * *"]

[ai]
binding = "AI"

[vars]
# Visible model knobs. These are intentionally in wrangler.toml so they show
# up in Cloudflare Variables and can be changed without touching code.
PUBLIC_MODEL_NAME = "companion"
CHAT_MODEL = "deepseek/deepseek-v4-pro"
MEMORY_FILTER_MODEL = "workers-ai/@cf/meta/llama-3.3-70b-instruct-fp8-fast"
MEMORY_FILTER_MAX_CANDIDATES = "12"
MEMORY_FILTER_MAX_OUTPUT = "5"
MEMORY_FILTER_MAX_CONTENT_CHARS = "700"
MEMORY_FILTER_OUTPUT_CHARS = "300"
MEMORY_FILTER_MAX_TOKENS = "1400"
MEMORY_FILTER_MIN_SCORE = "0.35"
DREAM_MODEL = "deepseek/deepseek-v4-pro"
VISION_MODEL = "google-ai-studio/gemini-3-flash-preview"
MEMORY_BACKEND = "vectorize"
MEMORY_MIN_SCORE = "0.35"
MEMORY_TOP_K = "50"
MEMORY_RERANKER_MODEL = "workers-ai/@cf/baai/bge-reranker-base"
VECTORIZE_INDEX_NAME = "memo-kb"
EMBEDDING_MODEL = "workers-ai/@cf/google/embeddinggemma-300m"
EMBEDDING_DIMENSIONS = "768"
ENABLE_INCREMENTAL_MEMORY = "false"
ENABLE_DREAM = "true"
DREAM_TIME_ZONE = "Asia/Singapore"
DREAM_MAX_MESSAGES = "40"
DREAM_MEMORY_CONTEXT_LIMIT = "40"
DREAM_MAX_RUNS = "10"
DREAM_MAX_TOKENS = "8000"
ENABLE_DAILY_SUMMARY_MEMORY = "false"
ANTHROPIC_THINKING_ENABLED = "false"
ANTHROPIC_THINKING_BUDGET = "1024"
ANTHROPIC_CACHE_ENABLED = "true"
ANTHROPIC_AUTO_CACHE_ENABLED = "true"
ANTHROPIC_ROLLING_CACHE_ENABLED = "true"
ANTHROPIC_CACHE_TTL = "5m"
# For custom Anthropic-compatible providers whose base_url already ends in /v1,
# keep this as "messages". If the base_url is only the root domain, use
# "v1/messages".
CUSTOM_ANTHROPIC_MESSAGES_PATH = "messages"

# Private/account-specific variables live in the Cloudflare Dashboard:
# AI_GATEWAY_BASE_URL, CHATBOX_API_KEY, MEMORY_MCP_API_KEY,
# GUIDE_DOG_API_KEY, CF_AIG_TOKEN.
# D1 binding is auto-filled by `npm run setup:cloudflare`.

[[vectorize]]
binding = "VECTORIZE"
index_name = "memo-kb"

[[queues.producers]]
binding = "MEMORY_QUEUE"
queue = "companion-memory"

[[queues.consumers]]
queue = "companion-memory"
max_batch_size = 10
max_batch_timeout = 30
