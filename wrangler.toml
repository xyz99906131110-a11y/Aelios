name = "companion-memory-proxy"
main = "src/index.ts"
compatibility_date = "2026-04-01"

[vars]
# 你通常只需要改这一段。全部都可以作为 Cloudflare Text 变量覆盖。
PUBLIC_MODEL_NAME = "companion"
CHAT_MODEL = "anthropic/claude-sonnet-4-5"
MEMORY_FILTER_MODEL = "openai/gpt-4.1-mini"
MEMORY_MODEL = "google-ai-studio/gemini-2.5-flash"
VISION_MODEL = "openai/gpt-4.1-mini"
AI_GATEWAY_BASE_URL = "https://gateway.ai.cloudflare.com/v1/<account_id>/<gateway_id>"
CHATBOX_API_KEY = "sk-change-me"
CF_AIG_TOKEN = "change-me"

# D1 binding is auto-filled by `npm run setup:cloudflare`.

[[vectorize]]
binding = "VECTORIZE"
index_name = "memo-kb"

[[queues.producers]]
binding = "MEMORY_QUEUE"
queue = "companion-memory"

[[queues.consumers]]
queue = "companion-memory"
max_batch_size = 10
max_batch_timeout = 30
